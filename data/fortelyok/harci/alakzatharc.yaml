megjegyzések:
- text: 'Egyes alakzatok ismeretének több foka van, ezekre külön költeni kell. Például
    egy 🟣**Lovas ék** alakzat **2.fokához** külön alakzatként ismerni kell már a 🟣**Lovas
    ék** **1.fokát** is.'
- text: Ha egy csoportban a társak legalább fele alacsonyabb fokon ismeri az adott
    alakzatot, akkor mindenkire az alacsonyabb bónuszok érvényesek.
- text: 'A választható alakzatok (kicsi, nagy, lovas) listáját, módosítóit, alkalmazását
    lásd a Harcrendszer fejezet [Harci alakzatok](../057_harci_alakzatok.md) fejezetében.'

