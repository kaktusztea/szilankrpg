---
schema_version: 1           # a fortely séma verziója

név: ""
névkomment: ""                # a név melletti opcionális kiegészítő szöveg
maxfok: 0                     # [0;3] Legfeljebb hány foka lehet a fortélynak
session_toggle: false         # opcionális, boolean (default: false) — Aktív fülön toggle gomb, harcérték módosítók csak ha aktív
emlékeztető: false            # kötelező, boolean — Aktív fül Hatás pool "Fortély emlékeztetők" szekcióban megjelenik-e
többszörösség:
  spec_típus: ""              # Pl: "fegyver", "alakzat". Üres = nem többszörös.
  spec_lista: ""              # Megengedett értékek. Pl: ["lovas ék", "testudo"]
csoport: ""                   # lásd konstansok.yaml / fortély_csoportok
leírások:
  - text: ""
megjegyzések:
  - text: ""

kiterjeszti:
  normál: []                  # normál módban terjeszti ki ezeket a képzettségeket
  erős: []                    # erős módban terjeszti ki ezeket a képzettségeket

kp_perfok: 6
ingyenes_perszint: 0

fokok:
  - fok: 0                    # 0 == alapeset (ha van)
    követelménytext: ""       # Szöveges követelmény (nem kalkuláció alapja)
    követelmények: ""         # Megengedett: "képzettség", "mesterfegyver". Üres ha nincs.
    hatástext:                # Nem-gépesíthető, narratív hatások szövege
      - text: ""
    módosítók: ""             # Gépesíthető hatások listája. Üres ("") ha nincs.
  - fok: 1
    követelménytext: ""
    követelmények:            # Lista elemei ÉS kapcsolatban. Egy elem "név" mezője ha lista: VAGY kapcsolat (bármelyik teljesíti).
      - név: "harcmodor_neve" # string VAGY lista. Lista = VAGY kapcsolat, pl: ["közelharc", "kardvívás"]
        érték: 0              # képzettség szint
        típus: "képzettség"
      - név: "mesterfegyver"  # Opcionális; CSAK mesterfegyver fortélyra hivatkozhat
        érték: 0              # fok
        típus: "mesterfegyver"
    hatástext:
      - text: ""
    módosítók:                # Gépesíthető hatások. Üres ("") ha nincs, vagy nem gépesíthető.
      - cél: ""               # Mit módosít: KÉ / TÉ / VÉ / CÉ / SP / SFÉ / harckeret / manőver:név / MGT_TÉ_büntetés / sebzésdobás / ké_dobás / té_dobás / cé_dobás / képzettségpróba_dobás / tulajdonságpróba_dobás
        alcél: ""             # Opcionális: konkrét tulajdonság/képzettség neve (pl. "Edzettség", "Zárnyitás", "Látás")
        érték: 0              # Fix bónusz (flat/előny/hátrány mód esetén)
        mód: "flat"           # "flat": fix érték. "scaled": forrás x arány. "override": felülírja. "enyhít": Hatás fok csökkentés. "előny": kocka-reroll bónusz. "hátrány": kocka-reroll büntetés.
        forrás: ""            # Arányos módnál: melyik értékből (képzettség neve, stb.)
        arány: 0              # Arányos módnál: szorzó (pl. 0.5, 1)
        feltétel: ""          # Mikor aktív: "" = MINDIG. Egyébként "prefix:érték" formátum.
        megjegyzés: ""        # Opcionális: emberi olvasásra (pl. "méregellenállás dobásakor")

todo:
  - text: ""
