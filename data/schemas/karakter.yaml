---
# Szilánk RPG — Karakter séma (mentett példány validációja)
# A mentett .json fájlnak ehhez kell validálnia.
# NEM tároljuk a származtatott/számított értékeket (ÉP, KÉ, TÉ, VÉ, SP, KP, SFÉ, MGT, stb.)
schema_version: 2

név: ""                       # max 40 karakter
tsz: 1                        # Tapasztalati szint (1-21)
leírás: ""
kor: 20                       # 5-500
vallás: ""

tulajdonságok:
  erő: 0                      # -5..+7
  edzettség: 0
  ügyesség: 0
  gyorsaság: 0
  intelligencia: 0
  emlékezet: 0
  önuralom: 0
  érzékenység: 0

HM_TÉ: 0                     # KP-ból vásárolt Harcérték Módosító → TÉ-re
HM_VÉ: 0                     # KP-ból vásárolt Harcérték Módosító → VÉ-re
CM: 0                         # KP-ból vásárolt Célzóérték Módosító

szilánk: 1                    # 0-3 (nem származtatott, kiosztott)

képzettségek:                 # Egységes lista (nincs külön primer/szekunder/harcmodor)
  - név: ""                   # Képzettség neve VAGY "AlapNév: AlNév" többszöröseknél
    szint: 0                  # 0-15

fortélyok:                    # Egységes lista (harci, általános, érzék, szabad, kiemelt többszörösök)
  - név: ""                   # Fortély alap neve (megegyezik a fortely yaml "név" mezőjével)
    fok: 1                    # 1-maxfok (szabad fortélyoknál mindig 1)
    spec_típus: ""            # Többszöröseknél: megegyezik a fortely.yaml többszörösség.spec_típus-ával. Üres ha nem többszörös.
    spec_elem: ""             # Többszöröseknél: a konkrét választott elem (pl. "erv", "Erion", "kard, lovag"). Üres ha nem többszörös.

fortélyok_speciális:          # KP bónuszt adó speciális jellemzők (nem normál fortélyok)
  analfabéta: false
  apró_méretű_lény: false
  tartós_sérülés_fok: 0       # 0-3
  vakság: false
  süketség: false

hátterek:
  faj: ""                     # Faj neve (lookup kulcs → fajok.json)
  leíró:
    - ""
  karma:
    - ""

fegyverek:
  - alap: ""                  # Alaptípus neve (lookup kulcs → fegyverek.json)
    név: ""                   # Opcionális egyedi név (pl. "Vérvörös Penge")
    anyag: "acél"             # acél, bronz, abbitacél, mithrill, lunír
    idea: 0                   # -2..+4
    mesterfegyver_fok: 0      # 0-3

páncél:
  alap: ""                    # Alaptípus neve (lookup kulcs → konstansok.yaml páncél_struktúrák)
  név: ""                     # Opcionális egyedi név
  fémalapanyag: ""            # acél, bronz, abbitacél, mithrill, lunír, "" (nem fém)
  idea: 0                     # -4..+4
  kidolgozottság: "átlagos"   # pocsék, átlagos, mestermunka
  sisak: false
  végtagvédettség: 0          # 0-4
  méret_illeszkedés: "passzol"  # passzol, nem passzol, borzalmas
  rongálódás: 0               # SFÉ csökkenés

felszerelés:
  nagy_tárgyak:
    - név: ""
      MGT: 0                  # 1=közepes, 2=nagy

jegyzetek: ""                   # Szabad szöveges jegyzetmező

# ============================================================
# Session (runtime állapot — Game módban változó értékek)
# Ugyanabban a fájlban, szeparált szekcióban.
# Mentéskor mindig belekerül, betöltéskor hiánya = default értékek.
# ============================================================
session:
  vé_csökkenés: 0
  vé_history: []              # number[] — VÉ csökkenés történet
  manőver_pont_használt: 0
  sebzések: []                # { típus: "S"|"V"|"Z"|"FP", sorszám: number }[] — ÉP rubrikák állapota
  aktív_fegyver_index: 0      # Kiválasztott fegyver indexe a fegyverek[] tömbben
  aktív_pajzs: false
  aktív_páncél: true
  aktív_taktika: ""
  aktív_helyzet: ""
  aktív_manőver: ""
  aktív_státuszok: []         # string[]
