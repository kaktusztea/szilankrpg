---
# Schema: harci_helyzetek.yaml
# Gyökér: harci_helyzetek (lista)

harci_helyzetek:
  - név: ""                    # kötelező, string
    id: ""                     # kötelező, string (feltétel_kulcs generáláshoz)
    infó: ""                   # kötelező, string (rövid hatás leírás)
    hatások: []                # kötelező, lista (strukturált hatások, üres ha nem gépesített)
    tiltja_taktikákat: false   # opcionális, bool (ha true: összes taktika disabled amíg aktív)
    kizár_helyzetek: []        # opcionális, lista (ezen helyzetek nem adhatók hozzá amíg ez aktív)
    tiltott_fegyverfogások: [] # opcionális, lista (ezen fegyverfogások disabled amíg ez a helyzet aktív)
    csoport: ""                # kötelező, "játékos" | "km" — picker csoportosítás
    rejtett: false             # opcionális, bool (ha true: nem jelenik meg a picker-ben, automatikus)
