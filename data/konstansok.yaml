---
version: 2

# ============================================================
# Fortély követelmény és módosító célok (string alapú)
# ============================================================

# Követelmény típusok (fortélyoknál)
követelmény_típusok:
  - képzettség           # harcmodor képzettségek is ide tartoznak
  - mesterfegyver        # egyetlen megengedett fortély-követelmény

# Módosító célok (fortély hatásoknál, egészség levonásoknál, stb.)
módosító_célok:
  - KÉ
  - TÉ
  - VÉ
  - CÉ
  - SP
  - harckeret
  - manőver              # "manőver:név" formátumban használandó, pl. "manőver:kibontakozás"
  - MGT_TÉ_büntetés      # merevvért TÉ büntetés csökkentése

# ============================================================
# Harcérték konstansok
# ============================================================

harcérték_alap:
  KÉ: 0
  TÉ: 10
  VÉ: 30
  CÉ: -15

# ============================================================
# KP költségek és javadalmazások
# ============================================================

kp:
  perszint: 50
  szekunder_perszint: 20
  fortély_per_fok: 6
  hm: 6
  cm: 6

kp_bónusz:                    # Kiemelt Fortélyok után járó extra KP
  analfabéta: 6
  apró_méretű_lény: 18
  süketség: 12
  vakság: 18
  tartós_sérülés_per_fok: 6   # 1-3 fokozat, fokonként ennyi

# ============================================================
# Arányok, limitek
# ============================================================

arányok:
  max_hm_diff_szintlépésenként: 0.5       # kerekítés: lefelé
  képzettség_nemprimer_max_szint_plusz: 3

# ============================================================
# Egészség kategória levonások
# ============================================================

egészség_kategória_levonás:
  - szint: S1
    módosítók: []
  - szint: S2
    módosítók:
      - cél: "TÉ"
        érték: -3
  - szint: S3
    módosítók:
      - cél: "TÉ"
        érték: -6
  - szint: S4
    módosítók:
      - cél: "TÉ"
        érték: -9

# ============================================================
# Páncél struktúrák
# ============================================================

páncél_struktúrák:
  - struktúra: "posztó"
    leírás: "Posztó vagy bunda"
    fém: false
    merev: false
    mgt: 2
    sfé_fizikai: 2
    sfé_energia: 4
    ár_szorzó: 0.1
    idea_plusz_minusz: 0
  - struktúra: "fegyverkabát"
    leírás: "Fegyverkabát"
    fém: false
    merev: false
    mgt: 3
    sfé_fizikai: 3
    sfé_energia: 5
    ár_szorzó: 0.5
    idea_plusz_minusz: 0
  - struktúra: "bőr"
    leírás: "Bőrpáncél"
    fém: false
    merev: false
    mgt: 5
    sfé_fizikai: 7
    sfé_energia: 10
    ár_szorzó: 1
    idea_plusz_minusz: 1
  - struktúra: "lánc/sodrony"
    leírás: "Lánc vagy sodrony"
    fém: true
    merev: false
    mgt: 8
    sfé_fizikai: 10
    sfé_energia: 10
    ár_szorzó: 10
    idea_plusz_minusz: 1
  - struktúra: "pikkely"
    leírás: "Pikkely fémpáncél"
    fém: true
    merev: true
    mgt: 8
    sfé_fizikai: 15
    sfé_energia: 10
    ár_szorzó: 50
    idea_plusz_minusz: 2
  - struktúra: "lemez"
    leírás: "Lemezpáncél"
    fém: true
    merev: true
    mgt: 10
    sfé_fizikai: 20
    sfé_energia: 8
    ár_szorzó: 100
    idea_plusz_minusz: 3

páncél_védett_terület:
  torzó: 50
  sisak: 10
  végtagok: 10              # felkarok; alkarok; combok; lábszárak - tagonként

páncél_csatolt_tag_mgt:
  hajlékonyvért_nem_fém:
    pocsék: 1
    átlagos: 0.5
    mestermunka: 0
  hajlékonyvért_fém:
    pocsék: 2
    átlagos: 1
    mestermunka: 0.25
  merevvért_fém:
    pocsék: 3
    átlagos: 2
    mestermunka: 1

páncél_fémalapanyagok:
  - anyag: "acél"
    sfé_bónusz: 0
    mgt: 0
    ár_szorzó: 1
  - anyag: "bronz"
    sfé_bónusz: -5
    mgt: 2
    ár_szorzó: 0.5
  - anyag: "abbitacél"
    sfé_bónusz: 5
    mgt: -2
    ár_szorzó: 10
  - anyag: "mithrill"
    sfé_bónusz: 10
    mgt: -4
    ár_szorzó: 100
  - anyag: "lunír"
    sfé_bónusz: "10-20"
    mgt: -6
    ár_szorzó: 100000

páncél_ár_szorzó_kidolgozottság:
  pocsék: 0.5
  átlagos: 1
  mestermunka: 100

páncél_ár_szorzó_idea:
  - idea: -4
    ár_szorzó: 0.1
  - idea: -3
    ár_szorzó: 0.143
  - idea: -2
    ár_szorzó: 0.25
  - idea: -1
    ár_szorzó: 0.5
  - idea: 0
    ár_szorzó: 1
  - idea: 1
    ár_szorzó: 2
  - idea: 2
    ár_szorzó: 4
  - idea: 3
    ár_szorzó: 7
  - idea: 4
    ár_szorzó: 10

# ============================================================
# Csoportok
# ============================================================

háttér_csoportok: [faj, leíró, karma]
fortély_csoportok: [általános, érzékek, harci, kiemelt, mágia.metódusok, misztikus, szabad, távharc]
képzettség_csoportok: [harci, fizikai, világi, alvilági, művészeti, tudományos, faj misztériumok, misztikus, mágikus szférák és arkánumaik, papi mágia]
