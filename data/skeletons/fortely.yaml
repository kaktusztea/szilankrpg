---
név: ""
névkomment: ""                # a név melletti opcionális kiegészítő szöveg
skeleton_version: 4           # a fortely séma (skeleton) verziója
stage: ""                     # alpha, beta, prod
maxfok: 2                     # Legfeljebb hány foka lehet a fortélynak
többszörösség:
  - enabled: ""               # true / false
    jellemzőtípus: ""         # Pl: "harci alakzat"
    jellemzőlista: ""         # Pl: "lovas ék; testudo; ..."
csoport: ""                   # lásd konstansok.yaml / fortély_csoportok
leírások:
  - text: ""
megjegyzések:
  - text: ""
fokok:
  - fok: 0                    # 0 == alapeset
    status:                   # ⭕/✅
    követelménytext: ""       # Szöveges követelmény (nem kalkuláció alapja)
    követelmények: ""         # Lehet üres (""). Megengedett típusok: 2 (képzettség/harcmodor), 3 (kizárólag "mesterfegyver" fortély)
    hatástext:
      - text: ""
    hatások: ""
    kombihatások: ""
  - fok: 1
    status:
    követelménytext: ""
    követelmények:            # Megengedett típusok: 2 (képzettség/harcmodor), 3 (kizárólag "mesterfegyver" fortély)
      - név: "harcmodor_neve" # ebből több entry lehet. _ == VAGY kapcsolat.
        enabled: True
        érték: 0              # képzettségszint
        típus: 2              # 2: képzettség/harcmodor
        text: ""
      - név: "mesterfegyver"  # opcionális; CSAK "mesterfegyver" fortélyra hivatkozhat
        enabled: True
        érték: 0              # fok
        típus: 3              # 3: fortély (kizárólag mesterfegyver!)
        text: ""
    hatástext:
      - text: ""
    hatások:                  # Ha nem számszerűsíthető → üres ("")
      - név: ""
        enabled: True
        érték: 0              # bónusz
        típus: 0              # lásd: konstansok.yaml
        text: ""
    kombihatások:             # Kombinált hatások. Lehet üres ("").
      - forrásnév: ""
        enabled: True
        típus: 0              # lásd: konstansok.yaml
        bónuszarány: 0
        célnév: ""
        céltípus: 0           # lásd: konstansok.yaml
        text: ""
todo:
  - text: ""
