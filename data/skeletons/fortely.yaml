---
név: ""
névkomment: ""                # a név melletti opcionális kiegészítő szöveg
skeleton_version: 5           # a fortely séma (skeleton) verziója
stage: ""                     # alpha, beta, prod
maxfok: 2                     # Legfeljebb hány foka lehet a fortélynak
többszörösség:
  enabled: false              # Engedélyezett-e a fortély többszöri felvétele
  jellemzőtípus: ""           # Pl: "harci alakzat", "fegyver"
  jellemzőlista: ""           # Pl: "lovas ék; testudo; ..."
csoport: ""                   # lásd konstansok.yaml / fortély_csoportok
leírások:
  - text: ""
megjegyzések:
  - text: ""
fokok:
  - fok: 0                    # 0 == alapeset (ha van)
    status: ""                # ⭕/✅
    követelménytext: ""       # Szöveges követelmény (nem kalkuláció alapja)
    követelmények: ""         # Megengedett: "képzettség", "mesterfegyver". Üres ha nincs.
    hatástext:                # Nem-gépesíthető, narratív hatások szövege
      - text: ""
    módosítók: ""             # Gépesíthető hatások listája. Üres ("") ha nincs.
  - fok: 1
    status: ""
    követelménytext: ""
    követelmények:            # Opcionális lista. Üres ("") ha nincs követelmény.
      - név: "harcmodor_neve" # _ == VAGY kapcsolat. Pl: "közelharc_kardvívás_lándzsavívás"
        érték: 0              # képzettség szint
        típus: "képzettség"
      - név: "mesterfegyver"  # Opcionális; CSAK mesterfegyver fortélyra hivatkozhat
        érték: 0              # fok
        típus: "mesterfegyver"
    hatástext:
      - text: ""
    módosítók:                # Gépesíthető hatások. Üres ("") ha nincs, vagy nem gépesíthető.
      - cél: ""              # Mit módosít: KÉ / TÉ / VÉ / CÉ / SP / harckeret / manőver:név / MGT_TÉ_büntetés
        érték: 0             # Fix bónusz (flat mód esetén)
        mód: "flat"          # "flat": fix érték. "arányos": forrás × arány
        forrás: ""           # Arányos módnál: melyik értékből (képzettség neve, stb.)
        arány: 0             # Arányos módnál: szorzó (pl. 0.5, 1)
        feltétel: ""         # Mikor aktív: "" = MINDIG (karakter lapra számítandó). Egyébként szituáció neve.
todo:
  - text: ""
