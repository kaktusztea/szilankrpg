---
# Harci helyzetek — Aktív fül dropdown forrás
# Forrás: md/065_01_*.md
# Komplex hatások → informatív megjelenítés + §16 feltétel dispatch
# hatások[]: opcionális, strukturált (Hatás pool-hoz), mint statuszok.yaml-ban

harci_helyzetek:
  - név: "Belharci szituáció"
    feltétel_kulcs: "harci_helyzet:belharci_szituáció"
    infó: "Rövid fegyverek előnye, hosszú fegyverek hátránya. Külön szabályrendszer."

  - név: "Fegyverrántás váratlanul"
    feltétel_kulcs: "harci_helyzet:fegyverrántás"
    infó: "Megnyert KÉ + Előny+1 TÉ dobásra (első csapás)."
    hatások:
      - { hatás: "előny", érték: 1, cél: "té_dobás", megjegyzés: "első csapás" }

  - név: "Meglepetés"
    feltétel_kulcs: "harci_helyzet:meglepetés"
    infó: "Támadó: megnyert KÉ, Előny+1 TÉ, VÉ csökk:3. Védő: többsz. tám. elvesztés, utolsó."
    hatások:
      - { hatás: "előny", érték: 1, cél: "té_dobás" }
      - { hatás: "szöveges", cél: "vé_veszteség", megjegyzés: "VÉ csökk: 3" }
      - { hatás: "szöveges", cél: "támadások_száma", megjegyzés: "Védő: többszörös tám. elvesztés" }

  - név: "Készületlenség"
    feltétel_kulcs: "harci_helyzet:készületlenség"
    infó: "= Meglepetés hatásai."
    hatások:
      - { hatás: "előny", érték: 1, cél: "té_dobás" }
      - { hatás: "szöveges", cél: "vé_veszteség", megjegyzés: "VÉ csökk: 3" }
      - { hatás: "szöveges", cél: "támadások_száma", megjegyzés: "Védő: többszörös tám. elvesztés" }

  - név: "Beszorított helyzet"
    feltétel_kulcs: "harci_helyzet:beszorított"
    infó: "Ellenfél Előny+1 TÉ. Beszorított: Hátrány-1 KÉ/TÉ, 1 támadás elvesztés, mozgás feleződik."
    hatások:
      - { hatás: "hátrány", érték: -1, cél: "ké_dobás" }
      - { hatás: "hátrány", érték: -1, cél: "té_dobás" }
      - { hatás: "szöveges", cél: "támadások_száma", megjegyzés: "-1 támadás" }
      - { hatás: "arányos", érték: 0.5, cél: "mozgás" }

  - név: "Orvtámadás"
    feltétel_kulcs: "harci_helyzet:orvtámadás"
    infó: "Áldozat VÉ: Közelharc Puszta kézzel. Előny+2 TÉ. Harci anatómia SP bónusz aktív."
    hatások:
      - { hatás: "előny", érték: 2, cél: "té_dobás" }

  - név: "Hátulról támadás"
    feltétel_kulcs: "harci_helyzet:hátulról"
    infó: "Támadó: Előny+1 TÉ. Pajzs VÉ nem számít."
    hatások:
      - { hatás: "előny", érték: 1, cél: "té_dobás" }
      - { hatás: "szöveges", cél: "vé_veszteség", megjegyzés: "Pajzs VÉ nem számít" }

  - név: "Közrefogás"
    feltétel_kulcs: "harci_helyzet:közrefogás"
    infó: "+1 TÉ per extra támadó (max +4). Manőver Ellenpróba: legmagasabb MA számít."

  - név: "Levegőből támadás"
    feltétel_kulcs: "harci_helyzet:levegőből"
    infó: "Repülő→földi: Előny+1 TÉ, Előny+1 VÉ."
    hatások:
      - { hatás: "előny", érték: 1, cél: "té_dobás" }

  - név: "Magasabbról"
    feltétel_kulcs: "harci_helyzet:magasabbról"
    infó: "Előny+1 TÉ dobásra."
    hatások:
      - { hatás: "előny", érték: 1, cél: "té_dobás" }

  - név: "Védekező takarásban"
    feltétel_kulcs: "harci_helyzet:takarásban"
    infó: "VÉ:+10 (takarás mértékétől függ, KM dönt)."

  - név: "Pengeelőny"
    feltétel_kulcs: "harci_helyzet:pengeelőny"
    infó: "VÉ:+1..+4 (per 0.5 penge különbség)."

  - név: "Pengehátrány"
    feltétel_kulcs: "harci_helyzet:pengehátrány"
    infó: "VÉ:-1..-4 (per 0.5 penge különbség)."
