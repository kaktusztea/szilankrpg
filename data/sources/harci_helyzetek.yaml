  id: "belharci_helyzet"
  csoport: "semleges"
  rejtett: false
  tiltja_taktikákat: false
  kizár_helyzetek: ["lovas_harc", "léglovas_harc", "harci_szekér", "magasabbról", "levegőből", "kitartott_célzás", "takarásban"]
