schema_version: 1
név: "Belharcos"
névkomment: "adott fegyverre"
maxfok: 2
session_toggle: false
emlékeztető: false
kiérdemelhető: false
többszörösség:
  spec_típus: ""
  spec_lista: []
csoport: "harci"
leírások:
- text: "Testközelben érzed igazában elemedben magad."
- text: "Sikeres Belharcba kerülés maanőver esetén Belharci szituációba kkerülsz és harcértékeidre - csak Közelharc harcmodor esetén - a lent leírt pluszok járnak."
megjegyzések:
- text: "**Fontos**: Ezt a fortélyt konkrét fegyverre (Puszta kéz is ide tartozik)\
    \ kell felvenni, csak annak használatakor járnak a bónuszok. A Belharcot így többször\
    \ is fel lehet venni - különböző fegyverekre."
- text: "Az ellenfél módosítóinak változását lásd a Harcrendszer fejezet Belharc harci taktika leírásánál!"
kiterjeszti:
  normál: []
  erős: []
kp_perfok: 6
ingyenes_perszint: 0
