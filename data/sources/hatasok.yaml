hatások:
# --- Előny/Hátrány rendszer ---
- id: "előny_1"
  név: "Előny+1"
  leírás: "2x dob, nagyobb számít. Védekezésnél: támadó Hátrány-1."
  mechanika: [{operátor: "előny", érték: 1}]

- id: "előny_2"
  név: "Előny+2"
  leírás: "3x dob, legnagyobb számít. Védekezésnél: támadó Hátrány-2."
  mechanika: [{operátor: "előny", érték: 2}]

- id: "hátrány_1"
  név: "Hátrány-1"
  leírás: "2x dob, kisebb számít. Védekezésnél: támadó Előny+1."
  mechanika: [{operátor: "hátrány", érték: -1}]

- id: "hátrány_2"
  név: "Hátrány-2"
  leírás: "3x dob, legkisebb számít. Védekezésnél: támadó Előny+2."
  mechanika: [{operátor: "hátrány", érték: -2}]

