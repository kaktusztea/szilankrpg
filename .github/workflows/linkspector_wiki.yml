name: Linkspector wiki
on:
  push:
    branches: [ "master" ]
    paths-ignore:
      - 'segedlet/*'
  workflow_dispatch:

jobs:
  check-links:
    name: Check linkspector wiki
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          repository: ${{github.repository}}.wiki
      - name: Run linkspector wiki
        uses: umbrelladocs/action-linkspector@v1
        with:
          github_token: ${{ secrets.github_token }}
          reporter: github-check
          tool_name: "Linkspector wiki"
          fail_on_error: true
          fail_level: error
